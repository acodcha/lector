name: tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  formatting:
    name: Check C++ source code formatting with Clang-Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Print the version of the FindUtils package
        run: find --version
      - name: Print the version of the Clang-Format package
        run: clang-format --version
      - name: Check that all source code files are correctly formatted
        run: |
          find . -iname "*.hpp" -or -iname "*.cpp" | xargs clang-format --style=file -i
          CHANGES=$(git diff --name-only)
          if ! [ -z "$CHANGES" ]; then
            echo "Some source code files are incorrectly formatted. To format all source code files, run:"
            echo "    find . -iname '*.hpp' -or -iname '*.cpp' | xargs clang-format --style=file -i"
            exit 1
          fi
  build_and_test_bazel:
    name: Build and test Bazel targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Print the version of Bazel
        run: bazel --version
      - name: Build all Bazel targets and run all Bazel tests
        run: bazel test //...
  build_and_test_cmake:
    name: Build and test CMake targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Print the version of CMake
        run: cmake --version
      - name: Configure the CMake project
        run: cmake -S . -B build -D LECTOR_TEST=ON
      - name: Build all CMake targets
        run: cmake --build build --parallel
      - name: Run all CMake tests
        run: ctest --test-dir build
  build_and_test_meson:
    name: Build and test Meson targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Install Meson and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install --yes meson ninja-build
      - name: Print the version of Meson
        run: meson --version
      - name: Print the version of Ninja
        run: ninja --version
      - name: Create the Meson subprojects directory
        run: mkdir --parents subprojects
      - name: Download the Meson wrap for GoogleTest
        run: meson wrap install gtest
      - name: Configure the Meson project
        run: meson setup build
      - name: Build all Meson targets
        run: meson compile -C build
      - name: Run all Meson tests
        run: meson test -C build
