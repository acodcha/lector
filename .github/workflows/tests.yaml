name: tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  formatting:
    name: Check C++ source code formatting with Clang-Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Install the FindUtils and Clang-Format packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes findutils clang-format
      - name: Print the version of the FindUtils package
        run: find --version
      - name: Print the version of the Clang-Format package
        run: clang-format --version
      - name: Check that all source code files are correctly formatted
        run: |
          find . -iname *.hpp -or -iname *.cpp | xargs clang-format --style=file -i
          CHANGES=$(git diff --name-only)
          if ! [ -z "$CHANGES" ]; then
            echo "Some source code files are incorrectly formatted. To format all source code files, run:"
            echo "    find . -iname *.hpp -or -iname *.cpp | xargs clang-format --style=file -i"
            exit 1;
          fi
  build_and_test:
    name: Build and test Bazel targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Install the Curl, Git, and C++ packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes curl git g++
      - name: Print the version of the Curl package
        run: curl --version
      - name: Print the version of the Git package
        run: git --version
      - name: Print the version of the C++ package
        run: c++ --version
      - name: Install the Bazel package
        run: |
          curl https://bazel.build/bazel-release.pub.gpg | sudo apt-key add -
          echo "deb [arch=amd64] https://storage.googleapis.com/bazel-apt stable jdk1.8" | sudo tee /etc/apt/sources.list.d/bazel.list
          sudo apt-get update
          sudo apt-get install --yes bazel
      - name: Print the version of the Bazel package
        run: bazel --version
      - name: Build all Bazel targets
        run: bazel build //...
      - name: Run all Bazel tests
        run: bazel test //...
